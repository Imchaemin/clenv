name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="clenv-${VERSION}-${{ matrix.target }}.tar.gz"
          cp "target/${{ matrix.target }}/release/clenv" clenv
          tar czf "$ARCHIVE" clenv LICENSE README.md
          echo "SHA256=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          shasum -a 256 *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: Imchaemin/homebrew-clenv
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-clenv

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Formula
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          get_sha() {
            grep "$1" artifacts/checksums.txt | awk '{print $1}'
          }

          SHA_LINUX=$(get_sha "x86_64-unknown-linux-gnu")
          SHA_MACOS_X86=$(get_sha "x86_64-apple-darwin")
          SHA_MACOS_ARM=$(get_sha "aarch64-apple-darwin")

          BASE="https://github.com/Imchaemin/clenv/releases/download/v${VERSION}"

          cat > homebrew-clenv/Formula/clenv.rb << EOF
          class Clenv < Formula
            desc "Claude Code profile manager with git-based version control"
            homepage "https://github.com/Imchaemin/clenv"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/clenv-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              else
                url "${BASE}/clenv-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_X86}"
              end
            end

            on_linux do
              url "${BASE}/clenv-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "clenv"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/clenv --version")
            end
          end
          EOF

      - name: Commit and push Formula update
        run: |
          cd homebrew-clenv
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/clenv.rb
          git commit -m "clenv ${{ needs.release.outputs.version }}"
          git push
